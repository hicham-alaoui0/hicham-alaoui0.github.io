<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<meta name="description" content="Applied Data Scientist building AI, analytics, and decision systems across trading operations, risk modeling, and commercial decision-making." />
<meta property="og:title" content="Hicham Alaoui — Applied Data Scientist" />
<meta property="og:description" content="AI Systems Builder & Decision Scientist. Building production-oriented workflows for trading operations, risk visibility, and decision support." />

<link rel="preconnect" href="https://fonts.googleapis.com" />

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: #0a0a0f; color: #e8e6e0; font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }

  [data-theme="operator"] {
    --bg: #0a0a0f; --bg2: #111118; --bg3: #16161f;
    --fg: #e8e6e0; --fg2: #9b9890; --fg3: #5a5855;
    --accent: #00e87a; --accent-dim: rgba(0,232,122,0.08);
    --border: rgba(255,255,255,0.07); --border-hover: rgba(0,232,122,0.3);
    --tag-bg: rgba(0,232,122,0.1);
  }
  [data-theme="refined"] {
    --bg: #f5f3ee; --bg2: #eceae4; --bg3: #e3e0d8;
    --fg: #1a1916; --fg2: #6b6860; --fg3: #b0ada5;
    --accent: #1a1916; --accent-dim: rgba(26,25,22,0.06);
    --border: rgba(26,25,22,0.1); --border-hover: rgba(26,25,22,0.4);
    --tag-bg: rgba(26,25,22,0.08);
  }
  [data-theme="navy"] {
    --bg: #05101f; --bg2: #091828; --bg3: #0e2035;
    --fg: #e8eef5; --fg2: #8da4bc; --fg3: #4a6480;
    --accent: #d4a853; --accent-dim: rgba(212,168,83,0.08);
    --border: rgba(255,255,255,0.07); --border-hover: rgba(212,168,83,0.35);
    --tag-bg: rgba(212,168,83,0.1);
  }

  .app { background: var(--bg); color: var(--fg); min-height: 100vh; transition: background 0.4s, color 0.4s; }

  /* NAV */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 56px; height: 64px; background: transparent;
    transition: background 0.3s, border-bottom 0.3s;
  }
  .nav.scrolled { background: var(--bg); border-bottom: 1px solid var(--border); }
  .nav-logo { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 15px; letter-spacing: 0.04em; color: var(--fg); text-decoration: none; }
  .nav-links { display: flex; gap: 36px; }
  .nav-link { font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.08em; color: var(--fg2); text-decoration: none; text-transform: uppercase; transition: color 0.2s; cursor: pointer; background: none; border: none; }
  .nav-link:hover { color: var(--accent); }
  .nav-cta { font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.06em; padding: 8px 20px; border: 1px solid var(--border-hover); color: var(--accent); background: var(--accent-dim); border-radius: 3px; text-decoration: none; transition: all 0.2s; }
  .nav-cta:hover { background: var(--accent); color: var(--bg); }

  /* HERO */
  .hero { min-height: 100vh; display: flex; align-items: center; padding: 0 56px; position: relative; overflow: hidden; }
  .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; width: 100%; max-width: 1200px; margin: 0 auto; padding-top: 64px; }
  .hero-eyebrow { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
  .hero-eyebrow::before { content: ''; display: block; width: 32px; height: 1px; background: var(--accent); }
  .hero-name { font-family: 'Syne', sans-serif; font-size: clamp(44px, 5vw, 76px); font-weight: 800; line-height: 1.0; letter-spacing: -0.02em; color: var(--fg); margin-bottom: 20px; }
  .hero-title { font-family: 'Syne', sans-serif; font-size: clamp(18px, 2.2vw, 28px); font-weight: 400; color: var(--fg2); line-height: 1.3; margin-bottom: 32px; }
  .hero-desc { font-size: 15px; line-height: 1.7; color: var(--fg2); max-width: 480px; margin-bottom: 48px; }
  .hero-actions { display: flex; gap: 16px; flex-wrap: wrap; }
  .btn-primary { font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; padding: 14px 28px; background: var(--accent); color: var(--bg); border: none; border-radius: 3px; cursor: pointer; text-decoration: none; transition: all 0.2s; font-weight: 500; display: inline-block; }
  .btn-primary:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-ghost { font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; padding: 14px 28px; background: transparent; color: var(--fg2); border: 1px solid var(--border); border-radius: 3px; cursor: pointer; text-decoration: none; transition: all 0.2s; display: inline-block; }
  .btn-ghost:hover { border-color: var(--border-hover); color: var(--fg); }
  .hero-right { display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .hero-photo-wrap { position: relative; width: 320px; height: 380px; }
  .hero-photo { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; display: block; }
  .hero-photo-frame { position: absolute; top: -12px; right: -12px; width: calc(100% + 12px); height: calc(100% + 12px); border: 1px solid var(--border-hover); border-radius: 8px; pointer-events: none; opacity: 0.4; }
  .hero-scroll { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; }
  .hero-scroll-line { width: 1px; height: 48px; background: linear-gradient(to bottom, var(--accent), transparent); animation: scrollPulse 2s ease-in-out infinite; }
  @keyframes scrollPulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

  /* SECTION */
  .section { padding: 100px 56px; max-width: 1200px; margin: 0 auto; }
  .section-header { display: flex; align-items: baseline; gap: 24px; margin-bottom: 64px; }
  .section-num { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: var(--accent); }
  .section-title { font-family: 'Syne', sans-serif; font-size: clamp(28px, 3vw, 42px); font-weight: 700; letter-spacing: -0.02em; color: var(--fg); }
  .section-line { flex: 1; height: 1px; background: var(--border); margin-left: 24px; }
  .section-desc { max-width: 640px; color: var(--fg2); font-size: 15px; line-height: 1.7; margin-top: -40px; margin-bottom: 40px; }

  /* EXPERIENCE */
  .exp-timeline { position: relative; padding-left: 32px; }
  .exp-timeline::before { content: ''; position: absolute; left: 0; top: 8px; bottom: 8px; width: 1px; background: var(--border); }
  .exp-item { position: relative; margin-bottom: 80px; }
  .exp-item:last-child { margin-bottom: 0; }
  .exp-item::before { content: ''; position: absolute; left: -36px; top: 8px; width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
  .exp-period { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; color: var(--accent); margin-bottom: 8px; }
  .exp-role { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 600; color: var(--fg); margin-bottom: 4px; }
  .exp-company { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--fg2); margin-bottom: 16px; }
  .exp-points { display: flex; flex-direction: column; gap: 8px; }
  .exp-point { font-size: 14px; color: var(--fg2); line-height: 1.6; padding-left: 18px; position: relative; }
  .exp-point::before { content: '→'; position: absolute; left: 0; color: var(--fg3); font-size: 12px; }
  .exp-stack { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; padding-bottom: 4px; }

  /* PROJECTS */
  .projects-list { display: flex; flex-direction: column; gap: 2px; }
  .project-row { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: var(--bg); transition: border-color 0.2s; cursor: pointer; }
  .project-row:hover { border-color: var(--border-hover); }
  .project-row-header { display: grid; grid-template-columns: 1fr auto; align-items: center; padding: 28px 32px; gap: 24px; }
  .project-meta { display: flex; align-items: center; gap: 16px; min-width: 0; }
  .project-category { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); background: var(--tag-bg); padding: 4px 10px; border-radius: 3px; white-space: nowrap; flex-shrink: 0; }
  .project-name { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 600; color: var(--fg); }
  .project-stack { display: flex; gap: 8px; flex-wrap: wrap; justify-content: flex-end; }
  .stack-tag { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.06em; color: var(--fg3); padding: 3px 8px; border: 1px solid var(--border); border-radius: 3px; }
  .project-expand-icon { color: var(--fg3); font-size: 18px; transition: transform 0.3s, color 0.2s; flex-shrink: 0; }
  .project-row.open .project-expand-icon { transform: rotate(45deg); color: var(--accent); }
  .project-body { overflow: hidden; transition: max-height 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.3s; max-height: 0; opacity: 0; }
  .project-body.open { max-height: 900px; opacity: 1; }
  .project-body-inner { padding: 28px 32px 32px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 24px; border-top: 1px solid var(--border); }
  .project-block-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .project-block-text { font-size: 14px; line-height: 1.6; color: var(--fg2); }
  .project-highlights { margin-top: 12px; display: flex; flex-direction: column; gap: 6px; }
  .project-highlight { font-size: 13px; color: var(--fg2); padding-left: 14px; position: relative; line-height: 1.5; }
  .project-highlight::before { content: '—'; position: absolute; left: 0; color: var(--fg3); }
  .project-links { display: flex; gap: 12px; margin-top: 16px; flex-wrap: wrap; }
  .project-link { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.08em; color: var(--accent); text-decoration: none; padding: 6px 14px; border: 1px solid var(--border-hover); border-radius: 3px; transition: all 0.2s; }
  .project-link:hover { background: var(--accent-dim); }

  /* SKILLS */
  .skills-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 40px; }
  .skill-group-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); margin-bottom: 16px; }
  .skill-pills { display: flex; flex-wrap: wrap; gap: 8px; }
  .skill-pill { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--fg2); padding: 6px 14px; border: 1px solid var(--border); border-radius: 3px; transition: border-color 0.2s, color 0.2s; }
  .skill-pill:hover { border-color: var(--border-hover); color: var(--fg); }

  /* CERTIFICATIONS */
  .certs-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .cert-card { display: flex; flex-direction: column; padding: 20px 24px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg3); text-decoration: none; color: var(--fg); transition: border-color 0.2s, transform 0.2s; }
  .cert-card:hover { border-color: var(--border-hover); transform: translateY(-2px); }
  .cert-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; gap: 12px; }
  .cert-issuer { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); padding-top: 2px; }
  .cert-logo-wrap { width: 36px; height: 36px; background: #fff; border: 1px solid rgba(0,0,0,0.08); border-radius: 6px; padding: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .cert-logo { width: 100%; height: 100%; object-fit: contain; }
  .cert-logo-initial { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: #555; line-height: 1; }
  .cert-title { font-size: 14px; font-weight: 500; color: var(--fg); flex: 1; line-height: 1.4; margin-bottom: 16px; }
  .cert-footer { display: flex; justify-content: space-between; align-items: center; }
  .cert-date { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--fg3); }
  .cert-verify { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--accent); }

  /* CONTACT */
  .contact-section { border-top: 1px solid var(--border); padding: 100px 56px; background: var(--bg); }
  .contact-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
  .contact-headline { font-family: 'Syne', sans-serif; font-size: clamp(32px, 4vw, 54px); font-weight: 800; letter-spacing: -0.02em; color: var(--fg); line-height: 1.1; margin-bottom: 24px; }
  .contact-sub { font-size: 15px; color: var(--fg2); line-height: 1.7; margin-bottom: 40px; }
  .contact-links { display: flex; flex-direction: column; gap: 16px; }
  .contact-link { display: flex; align-items: center; gap: 16px; text-decoration: none; color: var(--fg); padding: 18px 24px; border: 1px solid var(--border); border-radius: 6px; transition: all 0.2s; background: var(--bg2); }
  .contact-link:hover { border-color: var(--border-hover); transform: translateX(4px); }
  .contact-link-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--fg3); }
  .contact-link-val { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; color: var(--fg); margin-top: 2px; }
  .contact-link-arrow { margin-left: auto; color: var(--fg3); transition: color 0.2s; }
  .contact-link:hover .contact-link-arrow { color: var(--accent); }

  footer { text-align: center; padding: 40px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.08em; color: var(--fg3); border-top: 1px solid var(--border); background: var(--bg); }

  /* ANIMATIONS */
  .fade-in { opacity: 0; transform: translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; }
  .fade-in.visible { opacity: 1; transform: translateY(0); }

  /* THEME TOGGLE */
  .theme-toggle {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    width: 44px; height: 44px; border-radius: 50%;
    border: 1px solid var(--border); background: var(--bg2); color: var(--fg2);
    cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }
  .theme-toggle:hover { border-color: var(--border-hover); color: var(--accent); }

  /* LOADING */
  .loading { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .loading-text { font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.1em; color: var(--fg3); }

  @media (max-width: 1024px) {
    .certs-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 768px) {
    .nav { padding: 0 24px; }
    .nav-links { display: none; }
    .hero { padding: 0 24px; }
    .hero-grid { grid-template-columns: 1fr; gap: 48px; }
    .hero-right { display: none; }
    .section { padding: 72px 24px; }
    .project-row-header { grid-template-columns: 1fr; gap: 12px; }
    .project-stack { display: none; }
    .project-body-inner { grid-template-columns: 1fr; }
    .skills-grid { grid-template-columns: 1fr; gap: 32px; }
    .certs-grid { grid-template-columns: 1fr; }
    .contact-section { padding: 72px 24px; }
    .contact-inner { grid-template-columns: 1fr; gap: 48px; }
  }
</style>
</head>
<body>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

function useScrolled() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const handler = () => setScrolled(window.scrollY > 30);
    window.addEventListener('scroll', handler);
    return () => window.removeEventListener('scroll', handler);
  }, []);
  return scrolled;
}

function useFadeIn() {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { el.classList.add('visible'); obs.disconnect(); }
    }, { threshold: 0.1 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return ref;
}

function FadeIn({ children, delay = 0, style = {} }) {
  const ref = useFadeIn();
  return <div ref={ref} className="fade-in" style={{ transitionDelay: `${delay}ms`, ...style }}>{children}</div>;
}

function ProjectRow({ project }) {
  const [open, setOpen] = useState(false);

  const links = [];
  if (project.links?.code && project.links.code !== '#') {
    links.push({ label: 'GitHub →', href: project.links.code });
  }
  if (project.links?.case && project.links.case !== '#') {
    links.push({ label: 'Case Study →', href: project.links.case });
  }

  const impactText = Array.isArray(project.impact)
    ? project.impact[0]
    : (project.impact || project.results || '');

  const category = project.tags?.[0] || project.category || '';
  const displayName = project.cardTitle || project.name || '';
  const stack = (project.stack || []).slice(0, 4);

  return (
    <div className={`project-row${open ? ' open' : ''}`}>
      <div className="project-row-header" onClick={() => setOpen(o => !o)}>
        <div className="project-meta">
          <span className="project-category">{category}</span>
          <span className="project-name">{displayName}</span>
        </div>
        <div style={{ display: 'flex', alignItems: 'center', gap: 16 }}>
          <div className="project-stack">
            {stack.map(s => <span key={s} className="stack-tag">{s}</span>)}
          </div>
          <span className="project-expand-icon">+</span>
        </div>
      </div>
      <div className={`project-body${open ? ' open' : ''}`}>
        <div className="project-body-inner">
          <div>
            <div className="project-block-label">Problem</div>
            <div className="project-block-text">{project.problem}</div>
          </div>
          <div>
            <div className="project-block-label">Approach</div>
            <div className="project-block-text">{project.approach}</div>
            {project.highlights && project.highlights.length > 0 && (
              <div className="project-highlights">
                {project.highlights.map((h, i) => (
                  <div key={i} className="project-highlight">{h}</div>
                ))}
              </div>
            )}
          </div>
          <div>
            <div className="project-block-label">Impact</div>
            <div className="project-block-text">{impactText}</div>
            {links.length > 0 && (
              <div className="project-links">
                {links.map(l => (
                  <a key={l.label} className="project-link" href={l.href} target="_blank" rel="noreferrer">
                    {l.label}
                  </a>
                ))}
              </div>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const scrolled = useScrolled();
  const [data, setData] = useState(null);
  const [certs, setCerts] = useState([]);
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem('ha-theme') || 'refined'; } catch { return 'refined'; }
  });

  useEffect(() => {
    Promise.all([
      fetch('data/profile.json').then(r => r.json()),
      fetch('data/certifications.json').then(r => r.json()).catch(() => [])
    ]).then(([profile, certifications]) => {
      setData(profile);
      setCerts(certifications);
    });
  }, []);

  useEffect(() => {
    try { localStorage.setItem('ha-theme', theme); } catch {}
  }, [theme]);

  const scrollTo = (id) => {
    const el = document.getElementById(id);
    if (el) window.scrollTo({ top: el.offsetTop - 70, behavior: 'smooth' });
  };

  const cycleTheme = () => {
    const themes = ['operator', 'refined', 'navy'];
    setTheme(t => themes[(themes.indexOf(t) + 1) % themes.length]);
  };

  if (!data) return (
    <div className="app loading" data-theme={theme}>
      <div className="loading-text">Loading...</div>
    </div>
  );

  const { hero, contact, experience, projects, skills, about } = data;

  return (
    <div className="app" data-theme={theme}>

      {/* NAV */}
      <nav className={`nav${scrolled ? ' scrolled' : ''}`}>
        <a className="nav-logo" href="#">HA</a>
        <div className="nav-links">
          <button className="nav-link" onClick={() => scrollTo('experience')}>Experience</button>
          <button className="nav-link" onClick={() => scrollTo('projects')}>Projects</button>
          <button className="nav-link" onClick={() => scrollTo('skills')}>Skills</button>
          <button className="nav-link" onClick={() => scrollTo('contact')}>Contact</button>
        </div>
        <a className="nav-cta" href={hero.cv_url} target="_blank" rel="noreferrer">Download CV</a>
      </nav>

      {/* HERO */}
      <section className="hero">
        <div className="hero-grid">
          <div>
            <FadeIn delay={0}><div className="hero-eyebrow">Applied Data Science & AI</div></FadeIn>
            <FadeIn delay={100}><h1 className="hero-name">Hicham<br />Alaoui</h1></FadeIn>
            <FadeIn delay={200}><div className="hero-title">AI Systems Builder &<br />Decision Scientist</div></FadeIn>
            <FadeIn delay={300}>
              <p className="hero-desc">{about?.narrative || hero.subline}</p>
            </FadeIn>
            <FadeIn delay={400}>
              <div className="hero-actions">
                <button className="btn-primary" onClick={() => scrollTo('projects')}>View Projects</button>
                <a className="btn-ghost" href={contact.linkedin} target="_blank" rel="noreferrer">LinkedIn</a>
                <a className="btn-ghost" href={contact.github} target="_blank" rel="noreferrer">GitHub</a>
              </div>
            </FadeIn>
          </div>
          <div className="hero-right">
            <FadeIn delay={200}>
              <div className="hero-photo-wrap">
                <div className="hero-photo-frame" />
                <img
                  className="hero-photo"
                  src="assets/images/profile/profile-gen.jpg"
                  alt="Hicham Alaoui"
                />
              </div>
            </FadeIn>
          </div>
        </div>
        <div className="hero-scroll"><div className="hero-scroll-line" /></div>
      </section>

      {/* EXPERIENCE */}
      <div style={{ background: 'var(--bg2)' }}>
        <div id="experience" className="section">
          <FadeIn>
            <div className="section-header">
              <span className="section-num">01</span>
              <h2 className="section-title">Experience</h2>
              <div className="section-line" />
            </div>
          </FadeIn>
          <div className="exp-timeline">
            {experience.map((e, i) => (
              <FadeIn key={i} delay={i * 120}>
                <div className="exp-item">
                  <div className="exp-period">{e.dates}</div>
                  <div className="exp-role">{e.role}</div>
                  <div className="exp-company">{e.company}</div>
                  <div className="exp-points">
                    {(e.bullets || []).map((p, j) => (
                      <div key={j} className="exp-point">{p}</div>
                    ))}
                  </div>
                  {e.stack && e.stack.length > 0 && (
                    <div className="exp-stack">
                      {e.stack.map(s => <span key={s} className="stack-tag">{s}</span>)}
                    </div>
                  )}
                </div>
              </FadeIn>
            ))}
          </div>
        </div>
      </div>

      {/* EDUCATION */}
      <div style={{ background: 'var(--bg)' }}>
        <div className="section" style={{ paddingBottom: 48 }}>
          <FadeIn>
            <div className="section-header">
              <span className="section-num">02</span>
              <h2 className="section-title">Education</h2>
              <div className="section-line" />
            </div>
          </FadeIn>
          <div className="exp-timeline">
            <FadeIn>
              <div className="exp-item">
                <div className="exp-period">2022 — 2025</div>
                <div className="exp-role">State Engineer — Applied Economics, Statistics & Big Data</div>
                <div className="exp-company">INSEA · Rabat</div>
              </div>
            </FadeIn>
          </div>
        </div>
      </div>

      {/* PROJECTS */}
      <div style={{ background: 'var(--bg2)' }}>
        <div id="projects" className="section">
          <FadeIn>
            <div className="section-header">
              <span className="section-num">03</span>
              <h2 className="section-title">Projects</h2>
              <div className="section-line" />
            </div>
          </FadeIn>
          <FadeIn>
            <p className="section-desc">
              Systems and modeling work across applied AI, analytics, and decision science.
              Click any row to expand.
            </p>
          </FadeIn>
          <div className="projects-list">
            {projects.map((p, i) => (
              <FadeIn key={i} delay={i * 60}>
                <ProjectRow project={p} />
              </FadeIn>
            ))}
          </div>
        </div>
      </div>

      {/* SKILLS */}
      <div style={{ background: 'var(--bg)' }}>
        <div id="skills" className="section">
          <FadeIn>
            <div className="section-header">
              <span className="section-num">04</span>
              <h2 className="section-title">Skills</h2>
              <div className="section-line" />
            </div>
          </FadeIn>
          <div className="skills-grid">
            {Object.entries(skills).map(([category, items], i) => (
              <FadeIn key={category} delay={i * 80}>
                <div>
                  <div className="skill-group-label">{category}</div>
                  <div className="skill-pills">
                    {items.map(s => <span key={s} className="skill-pill">{s}</span>)}
                  </div>
                </div>
              </FadeIn>
            ))}
          </div>
        </div>
      </div>

      {/* CERTIFICATIONS */}
      {certs.length > 0 && (
        <div style={{ background: 'var(--bg2)' }}>
          <div id="certifications" className="section">
            <FadeIn>
              <div className="section-header">
                <span className="section-num">05</span>
                <h2 className="section-title">Certifications</h2>
                <div className="section-line" />
              </div>
            </FadeIn>
            <div className="certs-grid">
              {certs.map((c, i) => (
                <FadeIn key={i} delay={i * 60}>
                  <a className="cert-card" href={c.verifyUrl} target="_blank" rel="noreferrer">
                    <div className="cert-header">
                      <div className="cert-issuer">{c.issuer}</div>
                      <div className="cert-logo-wrap">
                        {c.logo
                          ? <img
                              className="cert-logo"
                              src={c.logo}
                              alt={c.issuer}
                              onError={e => { e.target.style.display = 'none'; e.target.nextSibling.style.display = 'block'; }}
                            />
                          : null
                        }
                        <span className="cert-logo-initial" style={{ display: c.logo ? 'none' : 'block' }}>
                          {c.issuer.charAt(0)}
                        </span>
                      </div>
                    </div>
                    <div className="cert-title">{c.title}</div>
                    <div className="cert-footer">
                      <span className="cert-date">{c.displayDate}</span>
                      <span className="cert-verify">Verify →</span>
                    </div>
                  </a>
                </FadeIn>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* CONTACT */}
      <div id="contact" className="contact-section">
        <div className="contact-inner">
          <FadeIn>
            <div>
              <h2 className="contact-headline">Let's work<br />together.</h2>
              <p className="contact-sub">
                Open to opportunities in Data Science, Applied AI, Machine Learning, and Analytics.
                Particularly interested in roles where technical depth translates directly to business impact.
              </p>
              <a className="btn-primary" href={hero.cv_url} target="_blank" rel="noreferrer">Download CV</a>
            </div>
          </FadeIn>
          <FadeIn delay={150}>
            <div className="contact-links">
              {[
                { label: 'Email', val: contact.email, href: `mailto:${contact.email}`, external: false },
                { label: 'LinkedIn', val: 'hicham-alaoui-08ba35206', href: contact.linkedin, external: true },
                { label: 'GitHub', val: 'hicham-alaoui0', href: contact.github, external: true },
              ].map(l => (
                <a
                  key={l.label}
                  className="contact-link"
                  href={l.href}
                  {...(l.external ? { target: '_blank', rel: 'noreferrer' } : {})}
                >
                  <div>
                    <div className="contact-link-label">{l.label}</div>
                    <div className="contact-link-val">{l.val}</div>
                  </div>
                  <span className="contact-link-arrow">→</span>
                </a>
              ))}
            </div>
          </FadeIn>
        </div>
      </div>

      <footer>© 2026 Hicham Alaoui · Applied Data Science & AI</footer>

      <button
        className="theme-toggle"
        onClick={cycleTheme}
        title="Switch theme"
        aria-label="Switch color theme"
      >◑</button>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
<div id="root"></div>
</body>
</html>
